<!DOCTYPE html>
<html>
<head>
    <title>House Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>House Management</h2>

<label>House Number</label>
<input type="text" id="houseNumber" placeholder="e.g. A1">

<label>House Type</label>
<input type="text" id="houseType" placeholder="e.g. Bedsitter">

<label>Monthly Rent</label>
<input type="number" id="houseRent" placeholder="e.g. 8000">

<button onclick="addHouse()">Add House</button>

<p id="houseMessage"></p>

<br><br>

<h3>Available Houses</h3>

<table border="1">
<tr>
<th>House No.</th>
<th>Type</th>
<th>Rent</th>
</tr>

<tbody id="houseTable"></tbody>

</table>

<br>

<button onclick="location.href='dashboard.html'">
Back to Dashboard
</button>

</div>

<script src="script.js"></script>

<script>

let houses = JSON.parse(localStorage.getItem("houses")) || [];

function displayHouses(){

    let table = document.getElementById("houseTable");

    table.innerHTML = "";

    houses.forEach(function(house){

        table.innerHTML += `
        <tr>
            <td>${house.number}</td>
            <td>${house.type}</td>
            <td>Ksh ${house.rent}</td>
        </tr>
        `;

    });

}

displayHouses();

</script>

</body>
</html>

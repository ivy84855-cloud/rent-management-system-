<!DOCTYPE html>
<html>
<head>
    <title>Tenant Registration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h2>Tenant Registration</h2>

    <label>Tenant Name</label>
    <input type="text" id="name" placeholder="Enter tenant name">

    <label>Phone Number</label>
    <input type="text" id="phone" placeholder="Enter phone number">

    <label>House Number</label>
    <input type="text" id="house" placeholder="Enter house number">

    <label>Rent Amount</label>
    <input type="number" id="rent" placeholder="Enter rent amount">

    <button onclick="registerTenant()">Register Tenant</button>

    <p id="message"></p>

    <button onclick="location.href='dashboard.html'">
        Back to Dashboard
    </button>

</div>

<script src="script.js"></script>

</body>
</html>

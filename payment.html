<!DOCTYPE html>
<html>
<head>
    <title>Rent Payment</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h2>Rent Payment</h2>

    <label>Tenant Name</label>
    <input type="text" id="tenantName" placeholder="Enter tenant name">

    <label>House Number</label>
    <input type="text" id="houseNumber" placeholder="Enter house number">

    <label>Amount Paid</label>
    <input type="number" id="amount" placeholder="Enter amount">

    <label>Payment Date</label>
    <input type="date" id="date">

    <button onclick="makePayment()">Submit Payment</button>

    <p id="paymentMessage"></p>

    <button onclick="location.href='dashboard.html'">
        Back to Dashboard
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
